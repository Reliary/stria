name: Release
on:
  push:
    tags: ["v*"]

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        shell: bash
        run: |
          BIN="stria"
          SUFFIX=""
          if [[ "${{ matrix.target }}" == *-windows-* ]]; then SUFFIX=".exe"; fi
          ARCHIVE="stria-${{ matrix.target }}.tar.gz"
          if [[ "${{ matrix.target }}" == *-windows-* ]]; then ARCHIVE="stria-${{ matrix.target }}.zip"; fi
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${BIN}${SUFFIX}" dist/
          cd dist
          if [[ "${{ matrix.target }}" == *-windows-* ]]; then
            7z a "../$ARCHIVE" "${BIN}${SUFFIX}"
          else
            tar czf "../$ARCHIVE" "${BIN}${SUFFIX}"
          fi
      - uses: softprops/action-gh-release@v2
        with:
          files: stria-*.tar.gz
