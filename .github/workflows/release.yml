name: Release
on:
  push:
    tags: ["v*"]

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - name: Install target
        run: rustup target add ${{ matrix.target }}
      - name: Install cross-compilation deps
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq gcc-aarch64-linux-gnu
          mkdir -p .cargo
          echo '[target.aarch64-unknown-linux-gnu]' >> .cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> .cargo/config.toml
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        shell: bash
        run: |
          BIN="stria${{ contains(matrix.target, 'windows') && '.exe' || '' }}"
          ARCHIVE="stria-${{ matrix.target }}.tar.gz"
          if [[ "${{ matrix.target }}" == *-windows-* ]]; then ARCHIVE="stria-${{ matrix.target }}.zip"; fi
          cp "target/${{ matrix.target }}/release/$BIN" "$BIN"
          if [[ "${{ matrix.target }}" == *-windows-* ]]; then
            7z a "$ARCHIVE" "$BIN"
          else
            tar czf "$ARCHIVE" "$BIN"
          fi
      - uses: softprops/action-gh-release@v2
        with:
          files: stria-*
          append: true
